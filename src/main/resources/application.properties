spring.application.name=Automata
spring.application.version=2.0.0
#spring.profiles.active=dev (now automatically detected in AutomataApplication.java)
server.address=0.0.0.0
server.port=8010
spring.data.mongodb.authentication-database=admin
spring.data.mongodb.username=admin
spring.data.mongodb.password=12345678
spring.jackson.time-zone=Asia/Kolkata
spring.data.mongodb.database=automata
spring.data.mongodb.port=27017
# Moved to application-profile.properties
#spring.data.mongodb.host=mongodb
spring.data.mongodb.auto-index-creation=true
application.security.jwt.secret-key=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
# 1h in millisecond
application.security.jwt.expiration=604800000
application.security.jwt.refresh-token.expiration=604800000
#mqtt
# Moved to application-profile.properties
#application.mqtt.url=tcp://hivemq-ce:1883
application.mqtt.url_public=tcp://broker.hivemq.com:1883
application.mqtt.user=automata
application.mqtt.password=adminautomata12345678
# Redis connection properties
# Moved to application-profile.properties
#spring.data.redis.host=redis
spring.data.redis.port=6379
# Enable caching with Redis
spring.cache.type=redis
spring.threads.virtual.enabled=true
#management.endpoints.web.exposure.include=health,info,metrics
#management.endpoints.web.cors.allowed-origins=http://localhost:5173
#management.endpoints.web.cors.allowed-methods=GET
#debug=true
#logging.level.org.springframework.security=TRACE
#logging.level.dev.automata.automata.automation_engine=DEBUG
app.location.lat=17.4552401
app.location.long=78.3989219
# MCP Server (Model Context Protocol)
#spring.ai.mcp.server.transport=SSE
spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.sse-message-endpoint=/mcp/message
#spring.ai.mcp.server.sse.endpoint=/mcp/sse
spring.ai.mcp.server.name=automata-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.jackson.deserialization.fail-on-unknown-properties=false
spotify.client-id=${SPOTIFY_CLIENT_ID}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET}
spotify.redirect-uri=${SPOTIFY_REDIRECT_URI:https://automata.realsubhamgupta.in/api/v1/spotify/callback}
spotify.scopes=user-read-playback-state,user-modify-playback-state,user-read-currently-playing